<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Control — Catégories</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <span>🛡️</span> Web Control
    </div>
    <nav>
        <a href="index.html"      class="nav-item"><span class="icon">📊</span> Dashboard</a>
        <a href="logs.html"       class="nav-item"><span class="icon">📋</span> Journal DNS</a>
        <a href="domains.html"    class="nav-item"><span class="icon">🚫</span> Domaines bloqués</a>
        <a href="categories.html" class="nav-item active"><span class="icon">🏷️</span> Catégories</a>
        <a href="policies.html"   class="nav-item"><span class="icon">📜</span> Politiques</a>
        <a href="reports.html"    class="nav-item"><span class="icon">📈</span> Rapports</a>
    </nav>
</aside>

<div class="main">
    <div class="topbar">
        <div>
            <h1>Catégories</h1>
            <div class="subtitle">Gérer les catégories de blocage</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('modal-category')">+ Nouvelle catégorie</button>
    </div>

    <div class="content">
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Description</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categories-body">
                        <tr class="loading-row"><td colspan="4">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal ajout/édition -->
<div class="modal-overlay" id="modal-category">
    <div class="modal">
        <div class="modal-title" id="modal-title">Nouvelle catégorie</div>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Nom</label>
            <input type="text" id="input-name" placeholder="Ex: Jeux d'argent">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="input-description" rows="3" placeholder="Description de la catégorie..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('modal-category')">Annuler</button>
            <button class="btn btn-primary" onclick="saveCategory()">Enregistrer</button>
        </div>
    </div>
</div>

<!-- Modal confirmation suppression -->
<div class="modal-overlay" id="modal-delete">
    <div class="modal">
        <div class="modal-title">Confirmer la suppression</div>
        <p style="color:var(--text-muted); margin-bottom:8px;">Cette action est irréversible.</p>
        <input type="hidden" id="delete-id">
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('modal-delete')">Annuler</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Supprimer</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/categories.js"></script>
</body>
</html>
